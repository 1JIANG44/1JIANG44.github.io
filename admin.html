<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel - GamePortal</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,sans-serif}
body{background:#f5f5f5}
.login{max-width:400px;margin:60px auto;background:white;padding:30px;border-radius:8px;box-shadow:0 2px 10px rgba(0,0,0,.1)}
.login h2{margin-bottom:20px;text-align:center}
input{width:100%;padding:10px;margin-bottom:12px;border:1px solid #ddd;border-radius:6px}
button{width:100%;padding:10px;background:#ff6600;color:white;border:none;border-radius:6px;cursor:pointer}
.panel{display:none;padding:20px;max-width:1000px;margin:0 auto}
.header{display:flex;justify-content:space-between;margin-bottom:20px}
.card{background:white;padding:20px;border-radius:8px;margin-bottom:16px}
table{width:100%;border-collapse:collapse;margin-top:10px}
th,td{padding:10px;text-align:left;border-bottom:1px solid #eee}
th{background:#f9f9f9}
.action{color:#ff6600;cursor:pointer}
</style>
</head>
<body>

<div class="login" id="loginBox">
<h2>Admin Login</h2>
<input type="text" id="user" placeholder="Username">
<input type="password" id="pass" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<div class="panel" id="adminPanel">
<div class="header">
<h2>Game Management</h2>
<button onclick="logout()">Logout</button>
</div>
<div class="card">
<h3>Game List</h3>
<table>
<tr><th>Name</th><th>URL</th><th>Hot</th><th>Action</th></tr>
<tbody id="tableBody"></tbody>
</table>
</div>
</div>

<script>
function login(){
const u=document.getElementById('user').value;
const p=document.getElementById('pass').value;
if(u==='admin'&&p==='admin123'){
localStorage.setItem('adminLogined','1');
document.getElementById('loginBox').style.display='none';
document.getElementById('adminPanel').style.display='block';
loadGames();
}
else alert('Invalid username or password');
}

function logout(){
localStorage.removeItem('adminLogined');
location.reload();
}

function loadGames(){
const g=JSON.parse(localStorage.getItem('games'))||[];
const b=document.getElementById('tableBody');
b.innerHTML='';
g.forEach((e,i)=>{
const r=document.createElement('tr');
r.innerHTML=`<td>${e.name}</td><td>${e.url}</td><td>${e.hot?'Yes':'No'}</td><td class="action" onclick="del(${i})">Delete</td>`;
b.appendChild(r);
})
}

function del(i){
const g=JSON.parse(localStorage.getItem('games'));
g.splice(i,1);
localStorage.setItem('games',JSON.stringify(g));
loadGames();
}

if(localStorage.getItem('adminLogined')==='1'){
document.getElementById('loginBox').style.display='none';
document.getElementById('adminPanel').style.display='block';
loadGames();
}
</script>
</body>
</html>
